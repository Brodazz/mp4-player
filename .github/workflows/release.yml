name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            npm_platform: win32
            npm_arch: x64
          - target: linux-x64
            npm_platform: linux
            npm_arch: x64
          - target: darwin-x64
            npm_platform: darwin
            npm_arch: x64
          - target: darwin-arm64
            npm_platform: darwin
            npm_arch: arm64
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ffmpeg-static sceglie quale binario scaricare in base a npm_config_*,
      # non all'architettura dell'host: così possiamo impacchettare tutti i
      # target da un singolo runner ubuntu-latest (niente runner macOS Intel
      # in coda per ore).
      - name: Install dependencies
        run: npm ci
        env:
          npm_config_platform: ${{ matrix.npm_platform }}
          npm_config_arch: ${{ matrix.npm_arch }}

      - name: Package VSIX
        run: npx @vscode/vsce package --target ${{ matrix.target }} -o mp4-player-${{ matrix.target }}.vsix

      - name: Publish to Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx @vscode/vsce publish --packagePath mp4-player-${{ matrix.target }}.vsix -p ${{ env.VSCE_PAT }}

      - name: Attach VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mp4-player-${{ matrix.target }}.vsix
          generate_release_notes: true
