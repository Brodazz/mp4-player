name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ffmpeg gira in WebAssembly (nessun binario nativo), quindi il pacchetto è
      # universale: un solo job, niente matrice per-piattaforma.
      - name: Package VSIX
        run: npx @vscode/vsce package -o mp4-player.vsix

      # Se questa versione è già pubblicata (es. re-run), lo trattiamo come successo.
      - name: Publish to Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: |
          set +e
          OUT=$(npx @vscode/vsce publish --packagePath mp4-player.vsix -p "$VSCE_PAT" 2>&1)
          CODE=$?
          echo "$OUT"
          if [ $CODE -ne 0 ]; then
            if echo "$OUT" | grep -qi "already exists"; then
              echo "::notice::Questa versione è già pubblicata — ignoro."
              exit 0
            fi
            exit $CODE
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mp4-player.vsix
          generate_release_notes: true
